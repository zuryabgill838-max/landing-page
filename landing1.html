<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Landing Page</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:linear-gradient(135deg,#667eea,#764ba2);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    width:100%;
    max-width:1100px;
    background:#fff;
    border-radius:20px;
    overflow:hidden;
    display:flex;
    box-shadow:0 15px 40px rgba(0,0,0,.2);
}

.left{
    flex:1;
    background:linear-gradient(135deg,#6a11cb,#2575fc);
    color:#fff;
    padding:60px 40px;
    display:flex;
    flex-direction:column;
    justify-content:center;
}

.left h1{
    font-size:3rem;
    margin-bottom:15px;
}

.left p{
    line-height:1.7;
}

.right{
    flex:1;
    padding:40px;
    display:flex;
    justify-content:center;
    align-items:center;
}

.form{
    width:100%;
    max-width:400px;
}

.form h2{
    text-align:center;
    margin-bottom:20px;
}

.input{
    margin-bottom:15px;
}

.input input{
    width:100%;
    padding:14px;
    margin-bottom:10px;
    border:1px solid #ddd;
    border-radius:10px;
    outline:none;
}

.input input:focus{
    border-color:#2575fc;
}

.btn{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#2575fc;
    color:#fff;
    font-size:16px;
    cursor:pointer;
}

.btn:hover{
    background:#1b5fe0;
}

.switch{
    text-align:center;
    margin-top:15px;
}

.switch span{
    color:#2575fc;
    cursor:pointer;
    font-weight:bold;
}

#signupForm{
    display:none;
}

@media(max-width:768px){
    .container{
        flex-direction:column;
    }

    .left{
        text-align:center;
        padding:40px 20px;
    }

    .left h1{
        font-size:2rem;
    }
}
</style>
</head>

<body>

<div class="container">

    <div class="left">
        <h1>Hello</h1>
        <p>
            Welcome! Create a modern experience for your users with a beautiful,
            responsive landing page. Login or Sign Up to get started.
        </p>
    </div>

    <div class="right">
        <div class="form">

            <!-- Login Form -->
            <form id="loginForm">
                <h2>Login</h2>

                <div class="input">
                    <input type="email" placeholder="Email" required>
                    <input type="password" placeholder="Password" required>
                </div>

                <button type="button" class="btn">Login</button>

                <div class="switch">
                    Don't have an account?
                    <span onclick="showSignup()">Sign Up</span>
                </div>
            </form>

            <!-- Signup Form -->
            <form id="signupForm">
                <h2>Sign Up</h2>

                <div class="input">
                    <input type="text" placeholder="Full Name" required>
                    <input type="email" placeholder="Email" required>
                    <input type="password" placeholder="Password" required>
                </div>

                <button type="button" class="btn">Sign Up</button>

                <div class="switch">
                    Already have an account?
                    <span onclick="showLogin()">Login</span>
                </div>
            </form>

        </div>
    </div>

</div>

<script>
function showSignup(){
    document.getElementById("loginForm").style.display="none";
    document.getElementById("signupForm").style.display="block";
}

function showLogin(){
    document.getElementById("signupForm").style.display="none";
    document.getElementById("loginForm").style.display="block";
}
</script>

</body>
</html>
